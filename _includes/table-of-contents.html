{% comment %}
Table of Contents component.
Generates a table of contents from page headings (h2, h3).
{% endcomment %}

<div id="toc-container"
    style="margin-bottom: 30px; padding: 15px; background-color: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 6px;">
    <div style="font-weight: 600; margin-bottom: 12px; font-size: 14px; color: #24292e;">Table of Contents</div>
    <nav id="toc" style="font-size: 14px; line-height: 1.6;">
        <!-- TOC will be generated by JavaScript -->
    </nav>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const postContent = document.querySelector('.post-content');
        if (!postContent) return;

        // Get all h2 and h3 headings
        const headings = postContent.querySelectorAll('h2, h3');

        if (headings.length === 0) {
            document.getElementById('toc-container').style.display = 'none';
            return;
        }

        // Generate TOC
        const tocList = document.getElementById('toc');
        const fragment = document.createDocumentFragment();

        let currentLevel = 0;
        let listStack = [];

        headings.forEach((heading, index) => {
            // Assign ID if it doesn't have one
            if (!heading.id) {
                heading.id = 'heading-' + index;
            }

            const level = parseInt(heading.tagName.substring(1)); // h2 -> 2, h3 -> 3
            const text = heading.textContent;

            // Adjust nesting level
            if (level > currentLevel) {
                // Create new nested lists
                for (let i = currentLevel; i < level; i++) {
                    const ul = document.createElement('ul');
                    ul.style.listStyle = 'none';
                    ul.style.paddingLeft = i > 0 ? '20px' : '0';
                    ul.style.margin = '0';

                    if (listStack.length > 0) {
                        listStack[listStack.length - 1].appendChild(ul);
                    } else {
                        fragment.appendChild(ul);
                    }
                    listStack.push(ul);
                }
                currentLevel = level;
            } else if (level < currentLevel) {
                // Pop back to appropriate level
                listStack.splice(level - 2);
                currentLevel = level;
            }

            // Add list item
            const li = document.createElement('li');
            li.style.margin = '6px 0';

            const a = document.createElement('a');
            a.href = '#' + heading.id;
            a.textContent = text;
            a.style.color = '#0366d6';
            a.style.textDecoration = 'none';

            a.addEventListener('mouseenter', () => {
                a.style.textDecoration = 'underline';
            });
            a.addEventListener('mouseleave', () => {
                a.style.textDecoration = 'none';
            });

            li.appendChild(a);
            listStack[listStack.length - 1].appendChild(li);
        });

        tocList.appendChild(fragment);
    });
</script>
