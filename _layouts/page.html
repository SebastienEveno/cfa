---
layout: default
---

<article class="post">

    {% include breadcrumb.html %}

    <header class="post-header">
        <h1 class="post-title">{{ page.title | escape }}</h1>
    </header>

    {% include table-of-contents.html %}

    <div class="post-content">
        {{ content }}
    </div>

    <!-- Navigation Arrows -->
    <div class="post-navigation"
        style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px; padding-top: 20px; border-top: 2px solid #e8e8e8;">
        <div style="flex: 1;">
            {% if page.prev %}
            <a href="{{ page.prev }}"
                style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: #0366d6;">
                <span style="font-size: 24px;">←</span>
                <span>Previous</span>
            </a>
            {% endif %}
        </div>

        <div style="flex: 1; text-align: center;">
            <a href="/cfa/" style="text-decoration: none; color: #0366d6;">Home</a>
        </div>

        <div style="flex: 1; text-align: right;">
            {% if page.next %}
            <a href="{{ page.next }}"
                style="display: flex; align-items: center; justify-content: flex-end; gap: 8px; text-decoration: none; color: #0366d6;">
                <span>Next</span>
                <span style="font-size: 24px;">→</span>
            </a>
            {% endif %}
        </div>
    </div>

</article>

<!-- MathJax Configuration -->
<script>
    MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true
        },
        svg: {
            fontCache: 'global'
        }
    };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
