# Jekyll configuration for GitHub Pages

# Site settings
title: CFA Level II Study Materials
description: Comprehensive study materials for the CFA Level II exam
url: "https://SebastienEveno.github.io/cfa"

# Build settings
theme: minima
skin: auto
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Minima theme customization
minima:
  social_links:
    - platform: github
      user_url: "https://github.com/SebastienEveno/cfa"

# Header navigation
header_pages:
  - README.md
  - search.md
  - about.md

# Exclude files from the build
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
